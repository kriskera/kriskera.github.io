    <script>
      
      //notif
      const toastCN = document.querySelector(".toast-cn");
      const closeIconCN = document.querySelector(".close-cn");
      const progressCN = document.querySelector(".progress-cn");

      let connecttimer1, connecttimer2;

      function notifConnect() {
        toastCN.classList.add("active");
        progressCN.classList.add("active");
      
        connecttimer1 = setTimeout(() => {
          toastCN.classList.remove("active");
        }, 15000); //1s = 1000 milliseconds
      
        connecttimer2 = setTimeout(() => {
          progressCN.classList.remove("active");
        }, 300);
      };

      closeIconCN.addEventListener("click", () => {
        toastCN.classList.remove("active");
      
        setTimeout(() => {
          progressCN.classList.remove("active");
        }, 300);
      
        clearTimeout(connecttimer1);
        clearTimeout(connecttimer2);
      });
      
      const url = new URL(window.location.href);
      if (url.searchParams.has('formsubmitted')) {
        notifConnect();
      };
    </script>
